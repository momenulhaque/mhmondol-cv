function extractDOI(s){return s.replace(/^https?:\/\/(dx\.)?doi\.org\//i,'').trim()}

async function lookupDOI(){
  var raw=document.getElementById('doi-inp').value.trim();
  if(!raw){alert('Please paste a DOI first');return}
  var doi=extractDOI(raw);
  var btn=document.getElementById('fetchbtn');
  var sts=document.getElementById('dsts');
  btn.disabled=true;btn.textContent='Fetching...';
  sts.className='';sts.style.display='none';
  try{
    var r=await fetch('https://api.semanticscholar.org/graph/v1/paper/DOI:'+encodeURIComponent(doi)+'?fields=title,authors,year,journal,publicationVenue,citationCount');
    if(!r.ok)throw new Error('Paper not found (status '+r.status+'). Try Manual mode for preprints.');
    var d=await r.json();
    var authors=d.authors&&d.authors.length?d.authors.map(function(a){return a.name}).join(', '):'';
    var journal=(d.journal&&d.journal.name)||(d.publicationVenue&&d.publicationVenue.name)||'';
    var vol='';if(d.journal){if(d.journal.volume)vol+=d.journal.volume;if(d.journal.pages)vol+=(vol?', ':'')+d.journal.pages}
    document.getElementById('f-authors').value=authors;
    document.getElementById('f-year').value=d.year||'';
    document.getElementById('f-title').value=d.title||'';
    document.getElementById('f-journal').value=journal;
    document.getElementById('f-vol').value=vol;
    document.getElementById('f-doi').value='https://doi.org/'+doi;
    sts.textContent='Found! Citations: '+(d.citationCount||0)+'. Please review fields below and add your contribution.';
    sts.className='ok';sts.style.display='block';
    document.getElementById('f-contrib').focus();
  }catch(e){sts.textContent=''+e.message;sts.className='err';sts.style.display='block';}
  btn.disabled=false;btn.textContent='Fetch Details';
}

function saveNewPub(){
  var pub;
  if(CUR_MODE==='manual'){try{pub=JSON.parse(document.getElementById('f-json').value)}catch(e){alert('Invalid JSON: '+e.message);return}}
  else{
    var authors=document.getElementById('f-authors').value.trim();
    var title=document.getElementById('f-title').value.trim();
    if(!authors||!title){alert('Authors and Title are required');return}
    pub={authors:authors,year:parseInt(document.getElementById('f-year').value)||null,title:title,journal:document.getElementById('f-journal').value.trim(),vol:document.getElementById('f-vol').value.trim(),doi:document.getElementById('f-doi').value.trim()||document.getElementById('doi-inp').value.trim(),citations:0,contribution:document.getElementById('f-contrib').value.trim()};
    var sts=document.getElementById('f-status').value.trim();if(sts)pub.status=sts;
  }
  D.publications[CUR_SUB].push(pub);closePanel();render();fetchCitations();
}

function citId(sub,i){return'c-'+sub.substring(0,3)+'-'+i}

function pubH(p,sub,i){
  var pid='pe-'+sub.substring(0,3)+'-'+i;
  var h='<div class="pub">';
  h+='<div style="float:right;display:flex;gap:3px">';
  h+='<button class="ebt" onclick="openPanel(\''+pid+'\',D.publications.'+sub+'['+i+'])">Edit</button>';
  h+='<button class="dbt" onclick="delPub(\''+sub+'\','+i+')">Delete</button></div>';
  h+='<p class="pa">'+x(p.authors)+' ('+(p.year||'n/a')+')</p>';
  h+='<p class="pt">'+x(p.title)+'</p>';
  h+='<p class="pv"><strong>'+x(p.journal)+'</strong>'+(p.vol?', '+x(p.vol):'')+' </p>';
  h+='<div class="pm"><span class="bdg bc" id="'+citId(sub,i)+'">Cited: '+x(p.citations)+'</span>';
  if(p.status)h+='<span class="bdg bst">'+x(p.status)+'</span>';
  if(p.doi&&p.doi!='#'&&p.doi!='')h+='<a href="'+x(p.doi)+'" style="font-size:11px;color:var(--ac)">DOI</a>';
  h+='</div><p class="pcon">Contribution: '+x(p.contribution)+'</p>';
  h+='<div class="ep2" id="'+pid+'"><textarea></textarea><div>';
  h+='<button class="sv" onclick="saveP(\''+pid+'\',function(v){D.publications.'+sub+'['+i+']=v})">Save</button>';
  h+='<button class="ca" onclick="closeP(\''+pid+'\')">Cancel</button></div></div></div>';
  return h;
}

async function fetchCitations(){
  var cb=document.getElementById('citbar');
  var pairs=[];
  ['methodology','applied','submitted','ongoing'].forEach(function(sub){
    D.publications[sub].forEach(function(p,i){if(p.doi&&p.doi.indexOf('doi.org')>-1)pairs.push({sub:sub,idx:i,doi:extractDOI(p.doi)})});
  });
  if(!pairs.length)return;
  cb.textContent='Updating '+pairs.length+' citations...';
  var updated=0;
  for(var k=0;k<pairs.length;k++){
    var item=pairs[k];
    try{
      var r=await fetch('https://api.semanticscholar.org/graph/v1/paper/DOI:'+encodeURIComponent(item.doi)+'?fields=citationCount');
      if(r.ok){var d=await r.json();if(typeof d.citationCount==='number'){D.publications[item.sub][item.idx].citations=d.citationCount;var badge=document.getElementById(citId(item.sub,item.idx));if(badge)badge.textContent='Cited: '+d.citationCount;updated++;}}
    }catch(e){}
    await new Promise(function(res){setTimeout(res,250)});
  }
  cb.textContent='Citations live ('+updated+' updated)';
  setTimeout(function(){cb.textContent=''},5000);
}

render();
fetchCitations();

function exportDOCX(btn) {
  var orig = btn.textContent;
  btn.textContent = 'Building...'; btn.disabled = true;
  function go() {
    try {
      var dc = window.docx;
      var Document=dc.Document,Packer=dc.Packer,Paragraph=dc.Paragraph,TextRun=dc.TextRun,
          Table=dc.Table,TableRow=dc.TableRow,TableCell=dc.TableCell,
          AlignmentType=dc.AlignmentType,BorderStyle=dc.BorderStyle,
          WidthType=dc.WidthType,ShadingType=dc.ShadingType,
          LevelFormat=dc.LevelFormat,PageNumber=dc.PageNumber,Footer=dc.Footer;

      var NAVY="1A365D",GOLD="B8902A",GRAY="4A4A6A",LG="888888";
      var PW=12240,MG=1080,CW=PW-2*MG; // 10080 DXA
      var NB={style:BorderStyle.NONE,size:0,color:"FFFFFF"};
      var NBS={top:NB,bottom:NB,left:NB,right:NB};

      function rn(t,o){return new TextRun(Object.assign({text:String(t||''),font:"Arial",size:20},o||{}))}
      function bp(runs,o){return new Paragraph(Object.assign({spacing:{before:0,after:60},children:Array.isArray(runs)?runs:[runs]},o||{}))}
      function sp(n){return new Paragraph({spacing:{before:0,after:n||80},children:[]})}
      function hd(t){return new Paragraph({spacing:{before:300,after:80},border:{bottom:{style:BorderStyle.SINGLE,size:8,color:NAVY,space:4}},children:[new TextRun({text:t.toUpperCase(),bold:true,size:24,color:NAVY,font:"Arial"})]})}
      function sh(t){return new Paragraph({spacing:{before:160,after:60},children:[new TextRun({text:t,bold:true,italics:true,size:22,color:GOLD,font:"Arial"})]})}
      function twoCol(left,rightPs,lw){
        var rw=CW-(lw||1800);
        return new Table({width:{size:CW,type:WidthType.DXA},columnWidths:[lw||1800,rw],rows:[new TableRow({children:[
          new TableCell({borders:NBS,width:{size:lw||1800,type:WidthType.DXA},margins:{top:0,bottom:0,left:0,right:120},children:[new Paragraph({children:[rn(left,{color:GRAY,size:18})]})]}),
          new TableCell({borders:NBS,width:{size:rw,type:WidthType.DXA},margins:{top:0,bottom:0,left:0,right:0},children:rightPs})
        ]})]})}

      var ch=[];
      var p=D.personal;

      // Header
      ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{before:0,after:120},children:[new TextRun({text:p.name,bold:true,size:52,color:NAVY,font:"Georgia"})]}));
      ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{before:0,after:60},children:[rn(p.title,{color:GRAY,size:20})]}));
      ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{before:0,after:40},children:[rn(p.address+"  |  "+p.phone,{color:GRAY,size:18})]}));
      ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{before:0,after:200},children:[rn(p.email+"  |  "+p.office,{color:GRAY,size:18})]}));

      // Education
      ch.push(hd("Education"));
      D.education.forEach(function(e){
        ch.push(twoCol(e.period,[
          new Paragraph({children:[rn(e.degree,{bold:true})]}),
          new Paragraph({children:[rn(e.institution,{color:GRAY})]}),
          new Paragraph({children:[rn(e.note,{color:GRAY,size:18,italics:true})]})
        ]));
        ch.push(sp(60));
      });

      // Awards
      ch.push(hd("Awards & Scholarships"));
      var acw=[2600,2400,1600,3480];
      var aHdr=new TableRow({children:["Award","Authority","Amount","Occasion"].map(function(h,i){return new TableCell({shading:{fill:NAVY,type:ShadingType.CLEAR},width:{size:acw[i],type:WidthType.DXA},margins:{top:60,bottom:60,left:80,right:80},borders:NBS,children:[new Paragraph({children:[new TextRun({text:h,bold:true,size:18,color:"FFFFFF",font:"Arial"})]})]})})});
      var aRows=D.awards.map(function(a,idx){return new TableRow({children:[a.name,a.authority,a.amount,a.occasion].map(function(v,i){return new TableCell({shading:{fill:idx%2===0?"F0F4F8":"FFFFFF",type:ShadingType.CLEAR},width:{size:acw[i],type:WidthType.DXA},margins:{top:50,bottom:50,left:80,right:80},borders:NBS,children:[new Paragraph({children:[new TextRun({text:String(v||''),font:"Arial",size:18,bold:i===0})]})]})})})}); 
      ch.push(new Table({width:{size:CW,type:WidthType.DXA},columnWidths:acw,rows:[aHdr].concat(aRows)}));
      ch.push(sp(120));

      // Publications helper
      function addPubs(pubs,title){
        ch.push(sh(title));
        pubs.forEach(function(p){
          var runs=[rn((p.authors||'')+" ("+(p.year||'n/a')+"). ",{color:GRAY}),rn(p.title,{italics:true}),rn(". "+(p.journal||''),{bold:true})];
          if(p.vol)runs.push(rn(", "+p.vol));
          if(p.doi&&p.doi.indexOf('doi')>-1)runs.push(rn(". "+p.doi,{color:"0563C1"}));
          if(p.status)runs.push(rn(" ["+p.status+"]",{color:GOLD,italics:true}));
          if(p.citations>0)runs.push(rn(" | Cited: "+p.citations,{color:GRAY,italics:true}));
          ch.push(new Paragraph({spacing:{before:120,after:20},numbering:{reference:"pubs",level:0},children:runs}));
          ch.push(bp([rn("Contribution: "+(p.contribution||''),{italics:true,color:LG,size:18})],{indent:{left:360}}));
        });
      }

      ch.push(hd("Peer-reviewed Publications"));
      addPubs(D.publications.methodology,"Methodology-based publications");
      addPubs(D.publications.applied,"Applied publications");
      addPubs(D.publications.submitted,"Submitted & under review");
      addPubs(D.publications.ongoing,"Ongoing (yet to submit)");

      // Projects
      ch.push(hd("Research Projects"));
      D.projects.forEach(function(pr){
        ch.push(bp([rn(pr.title,{bold:true})]));
        ch.push(bp([rn("Funding: "+pr.funding+"  |  "+pr.duration+"  |  "+pr.amount+"  |  Status: ",{color:GRAY}),rn(pr.status,{bold:true,color:NAVY})]));
        ch.push(bp([rn("Contribution: "+pr.contribution,{italics:true,color:LG,size:18})],{spacing:{before:0,after:120}}));
      });

      // Software
      ch.push(hd("Software"));
      D.software.forEach(function(s){
        ch.push(bp([rn(s.name,{bold:true,font:"Courier New",color:NAVY}),rn(" ("+s.type+")  "+s.description)]));
        if(s.doi)ch.push(bp([rn(s.doi,{color:"0563C1",size:18})],{spacing:{before:0,after:100}}));
      });

      // Conference presentations
      ch.push(hd("Conference Presentations"));
      D.presentations.conference.forEach(function(pr){
        ch.push(new Paragraph({spacing:{before:100,after:20},numbering:{reference:"pubs",level:0},children:[rn("["+pr.type+"] ",{bold:true,color:NAVY}),rn(pr.title,{italics:true}),rn(". "+pr.venue+". "+pr.date+".")]}));
      });

      // Seminar presentations
      ch.push(hd("Seminar Presentations"));
      D.presentations.seminar.forEach(function(s){
        ch.push(new Paragraph({spacing:{before:80,after:20},numbering:{reference:"pubs",level:0},children:[rn(s.title,{italics:true}),rn(". "+s.venue+". "+s.date+".")]}));
      });

      // Theses
      ch.push(hd("Theses"));
      D.theses.forEach(function(t){
        ch.push(twoCol(t.degree+" ("+t.year+")",[
          new Paragraph({children:[rn(t.title,{italics:true})]}),
          new Paragraph({children:[rn(t.institution,{color:GRAY})]}),
          new Paragraph({children:[rn("Supervisor: "+t.supervisor,{color:GRAY,size:18})]})
        ],1200));
        ch.push(sp(60));
      });

      // Research experience
      ch.push(hd("Research Experience"));
      D.experience.research.forEach(function(e){
        ch.push(twoCol(e.period,[
          new Paragraph({children:[rn(e.title,{bold:true})]}),
          new Paragraph({children:[rn(e.org+(e.hours?" · "+e.hours:""),{color:GRAY})]}),
          new Paragraph({children:[rn(e.details,{color:GRAY,size:18})]}),
          e.supervisor?new Paragraph({children:[rn("Supervisor: "+e.supervisor,{color:LG,size:18,italics:true})]}):new Paragraph({children:[]})
        ]));
        ch.push(sp(80));
      });

      // Teaching
      ch.push(hd("Teaching Experience"));
      D.experience.teaching.forEach(function(e){
        ch.push(twoCol(e.period,[
          new Paragraph({children:[rn(e.title,{bold:true})]}),
          new Paragraph({children:[rn(e.org+" · "+e.hours,{color:GRAY})]})
        ]));
        ch.push(sp(60));
      });

      // Leadership
      if(D.leadership&&D.leadership.length){
        ch.push(hd("Leadership & Volunteering"));
        D.leadership.forEach(function(l){
          ch.push(twoCol(l.period,[
            new Paragraph({children:[rn(l.role,{bold:true})]}),
            new Paragraph({children:[rn(l.org,{color:GRAY})]}),
            new Paragraph({children:[rn(l.details,{color:GRAY,size:18})]})
          ]));
          ch.push(sp(60));
        });
      }

      // Memberships
      ch.push(hd("Professional Memberships"));
      D.memberships.forEach(function(m){
        ch.push(bp([rn(m.org,{bold:true}),rn("  "+m.role+"  "+m.period,{color:GRAY})]));
      });

      var doc=new Document({
        numbering:{config:[{reference:"pubs",levels:[{level:0,format:LevelFormat.DECIMAL,text:"%1.",alignment:AlignmentType.LEFT,style:{paragraph:{indent:{left:440,hanging:440}}}}]}]},
        styles:{default:{document:{run:{font:"Arial",size:20,color:"1A1A2E"}}}},
        sections:[{
          properties:{page:{size:{width:12240,height:15840},margin:{top:MG,right:MG,bottom:MG,left:MG}}},
          footers:{default:new Footer({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[rn("Momenul Haque Mondol  |  CV  |  Page ",{size:16,color:LG}),new TextRun({children:[PageNumber.CURRENT],size:16,color:LG,font:"Arial"}),rn(" of ",{size:16,color:LG}),new TextRun({children:[PageNumber.TOTAL_PAGES],size:16,color:LG,font:"Arial"})]})]})},
          children:ch
        }]
      });

      Packer.toBlob(doc).then(function(blob){
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');
        a.href=url; a.download='CV_Momenul_Haque_Mondol.docx'; a.click();
        setTimeout(function(){URL.revokeObjectURL(url)},1000);

    } catch(err) {

  }

  if(window.docx){ go(); }
  else {
    var s=document.createElement('script');
